run:
  timeout: 5m
  go: "1.22"

linters:
  disable-all: true
  enable:
    - errcheck
    - gosimple
    - govet
    - ineffassign
    - staticcheck
    - typecheck
    - unused
    - misspell
    - gofmt
    - goimports
    - gocyclo
    - revive

linters-settings:
  gofmt:
    simplify: true
  gocyclo:
    min-complexity: 20
  revive:
    rules:
      - name: unused-parameter
        disabled: true

issues:
  max-issues-per-linter: 0
  max-same-issues: 0
  exclude-rules:
    - path: _test\.go
      linters:
        - errcheck
        - gocyclo

    # Сложная машина состояний: таймаут, shutdown и гонка с enqueue.
    - path: main\.go
      linters:
        - gocyclo
      text: "dequeueWait"
